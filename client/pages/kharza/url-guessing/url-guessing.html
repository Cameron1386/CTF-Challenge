<!DOCTYPE html>
<html>
<head>
    <title>URL Guessing Challenge</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #content { margin-top: 20px; font-size: 18px; }
        button { margin-top: 20px; padding: 10px 15px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<h1>Random Article Generator</h1>
<p>Click the button to load a new random article!</p>

<div id="content"></div>
<button id="reroll">Reroll Article</button>

<script>
// ID range for random reroll (normal articles only)
const minID = 1;
const maxID = 30;

// Get ID from URL if exists
const params = new URLSearchParams(window.location.search);
let id = params.get("id");

// If no ID, pick random within normal range
if (!id) {
    id = Math.floor(Math.random() * (maxID - minID + 1)) + minID;
    history.replaceState(null, "", "?id=" + id);
}

// Show article content
async function showArticle(articleID) {
    const contentDiv = document.getElementById("content");

    try {
        const response = await fetch(`/api/article?id=${encodeURIComponent(articleID)}`);
        if (!response.ok) {
            contentDiv.innerText = "Article not found.";
            return;
        }

        const data = await response.json();
        contentDiv.innerText = data.content;
    } catch (error) {
        contentDiv.innerText = "Article not found.";
    }
}

showArticle(id);

// Reroll button event
document.getElementById("reroll").addEventListener("click", () => {
    const randomID = Math.floor(Math.random() * (maxID - minID + 1)) + minID;
    history.replaceState(null, "", "?id=" + randomID); // update URL
    showArticle(randomID);
});
</script>

</body>
</html>
